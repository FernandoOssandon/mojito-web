version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mojito_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mojito}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mojito_secret}
      POSTGRES_DB: ${POSTGRES_DB:-mojito_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-mojito}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mojito_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mojito}:${POSTGRES_PASSWORD:-mojito_secret}@postgres:5432/${POSTGRES_DB:-mojito_db}
    ports:
      - '3000:3000'
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mojito_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '8080:80'

volumes:
  postgres_data:
